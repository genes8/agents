services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_marketing
      POSTGRES_USER: agent_marketing
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      target: release
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://agent_marketing:change-me@db:5432/agent_marketing
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-deepseek-v4-pro}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.7}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-4096}
      MCP_STDIO_SERVERS: ${MCP_STDIO_SERVERS:-[]}
    command: sh -c "npm run deploy:migrate && npm run start:web"

  worker:
    build:
      context: .
      target: release
    restart: unless-stopped
    depends_on:
      - db
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://agent_marketing:change-me@db:5432/agent_marketing
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-deepseek-v4-pro}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.7}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-4096}
      MCP_STDIO_SERVERS: ${MCP_STDIO_SERVERS:-[]}
    command: sh -c "npm run deploy:migrate && npm run worker:start"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
